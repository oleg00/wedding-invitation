<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Запрошення - Олег та Руслана</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #213e1a;
      --cream: #fdfce2;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    @page {
      size: 105mm 148mm;
      margin: 0;
    }

    html {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    body {
      width: 105mm;
      height: 148mm;
      overflow: hidden;
      background: var(--cream);
    }

    /* ── Screen preview wrapper ── */
    @media screen {
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #666;
        width: auto;
        height: auto;
        overflow: auto;
      }
      .card {
        box-shadow: 0 8px 40px rgba(0,0,0,.45);
      }
    }

    /* ── Card ── */
    .card {
      width: 105mm;
      height: 148mm;
      background: var(--cream);
      overflow: hidden;
      padding: 5mm;
    }

    .frame {
      width: 100%;
      height: 100%;
      border: 1px solid rgba(33,62,26,.35);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 10mm 10mm;
      gap: 3.5mm;
    }

    .label {
      font-family: 'Playfair Display', serif;
      font-size: 6pt;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: rgba(33,62,26,.5);
	  margin-top: 1em;
    }

	.heading {
      font-family: 'Great Vibes', cursive;
      font-size: 24pt;
      color: var(--green);
      line-height: 1.0;
    }

    .names {
      font-family: 'Great Vibes', cursive;
      font-size: 20pt;
      color: var(--green);
      line-height: 1.0;
    }

    .names .amp {
      font-size: 26pt;
      opacity: .55;
    }

    .ornament {
      font-size: 10pt;
      color: rgba(33,62,26,.28);
      letter-spacing: .25em;
      margin: -1mm 0;
    }

    .sketch {
      width: 68mm;
      max-height: 38mm;
      object-fit: contain;
      filter: brightness(0) saturate(100%) invert(16%) sepia(29%) saturate(700%) hue-rotate(75deg) brightness(50%);
    }

    .divider {
      width: 18mm;
      height: .3mm;
      background: rgba(33,62,26,.25);
    }

    .invite-text {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 9.5pt;
      color: var(--green);
      line-height: 1.55;
      opacity: .82;
    }

    .venue-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14pt;
      font-weight: 600;
      color: var(--green);
      line-height: 1.2;
    }

    .venue-city {
      font-family: 'Playfair Display', serif;
      font-size: 6.5pt;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(33,62,26,.5);
      margin-top: -1mm;
    }

    .date-block {
      display: flex;
      align-items: center;
      gap: 4mm;
	  margin-top: -0.5em;
    }

    .date-part {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .date-dow,
    .date-month {
      font-family: 'Playfair Display', serif;
      font-size: 7pt;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: rgba(33,62,26,.65);
    }

    .date-day {
      font-family: 'Cormorant Garamond', serif;
      font-size: 30pt;
      font-weight: 300;
      color: var(--green);
      line-height: 1;
    }

    .date-year {
      font-family: 'Cormorant Garamond', serif;
      font-size: 9pt;
      font-weight: 600;
      color: rgba(33,62,26,.65);
      line-height: 1.2;
      letter-spacing: .08em;
    }

    .date-vsep {
      width: .4mm;
      height: 11mm;
      background: rgba(33,62,26,.3);
      flex-shrink: 0;
    }

    .time-line {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24pt;
      font-weight: 700;
      color: var(--green);
      letter-spacing: .12em;
      line-height: 1;
      margin-top: -1mm;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="frame">

      <p class="label">Весільне запрошення</p>

      <div class="heading">Дорогі</div>
		<p></p>

      <p class="ornament">----------------------------</p>

      <img class="sketch" src="photo-hall-transparent.png" alt="Ресторан Гостевія">

      <!-- <div class="divider"></div> -->

      <p class="invite-text">
        З великим задоволенням запрошуємо вас<br>
        розділити з нами урочиству та особливу <br> подію - наше весілля!
      </p>

      <!-- <div class="divider"></div> -->

      <p class="venue-name">Ресторан «Гостевія»</p>
      <p class="venue-city">м. Вінниця</p>

      <div class="date-block">
        <div class="date-part">
          <span class="date-dow">Субота</span>
        </div>
        <div class="date-vsep"></div>
        <div class="date-part" style="gap:1.5mm; padding:0 1mm;">
          <span class="date-day">5</span>
          <span class="date-year">14:00</span>
        </div>
        <div class="date-vsep"></div>
        <div class="date-part">
          <span class="date-month">Вересня</span>
        </div>
      </div>

	  <div class="names">
        Олег <span class="amp">&</span> Руслана
      </div>

    </div>
  </div>
</body>
</html>
